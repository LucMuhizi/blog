# .pages.yml
# Pages CMS configuration for nitetanzarn.com
# Built on Blog (Astro 7) — place this file at the repository root
# Docs: https://pagescms.org/docs/configuration/

# ---------------------------------------------------------------------------
# MEDIA
# ---------------------------------------------------------------------------
# Images and files uploaded through the CMS are stored in src/assets/uploads/
# and served via Cloudflare R2 in production (set PUBLIC_ASSET_BASE_URL in
# Cloudflare Pages environment variables to your R2 public URL).
# ---------------------------------------------------------------------------

media:
  input: src/assets/uploads
  output: /uploads
  extensions:
    - jpg
    - jpeg
    - png
    - webp
    - avif
    - gif
    - svg
    - pdf

# ---------------------------------------------------------------------------
# COMPONENTS
# Reusable field groups referenced across multiple collections.
# ---------------------------------------------------------------------------

components:

  seo:
    type: object
    label: SEO overrides
    description: Leave blank to use the title and description above.
    fields:
      - name: seoTitle
        label: SEO title
        type: string
        description: Custom <title> tag. Max 60 characters.
        options:
          maxlength: 60
      - name: seoDescription
        label: SEO description
        type: text
        description: Custom meta description. Max 160 characters.
        options:
          maxlength: 160
      - name: canonical
        label: Canonical URL
        type: string
        description: Set only if this content was originally published elsewhere (e.g. Medium).
        pattern: "^https?://.+"

  taxonomy:
    type: object
    label: Taxonomy
    fields:
      - name: category
        label: Category
        type: select
        required: true
        options:
          values:
            - label: Articles
              value: articles
            - label: Research
              value: research
            - label: Policy
              value: policy
            - label: Projects
              value: projects
            - label: Speaking & Media
              value: speaking
            - label: Notes
              value: notes
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - governance
            - development
            - policy
            - education
            - health
            - technology
            - africa
            - uganda
            - consultancy
            - research
            - strategy
            - leadership
            - innovation

# ---------------------------------------------------------------------------
# CONTENT
# ---------------------------------------------------------------------------

content:

  # -------------------------------------------------------------------------
  # ARTICLES — primary blog / thought leadership posts
  # Maps to: src/content/posts/en/*.mdx
  # Blog frontmatter schema
  # -------------------------------------------------------------------------

  - name: articles
    label: Articles
    type: collection
    path: src/content/posts/en
    extension: mdx
    filename:
      # Generates e.g. 2026-06-27-policy-brief-on-education.mdx
      prefix: "{year}-{month}-{day}-"
      field: title
      slugify: true
    view:
      fields: [title, category, pubDate, draft, featured]
      sort:
        - field: pubDate
          order: desc
      default_sort:
        field: pubDate
        order: desc
    fields:

      # Core
      - name: title
        label: Title
        type: string
        required: true
        description: The article headline. Keep under 80 characters for best SEO.
        options:
          maxlength: 80

      - name: description
        label: Summary
        type: text
        required: true
        description: Shown on article cards and in search results. 120–160 characters.
        options:
          minlength: 80
          maxlength: 160

      # Dates
      - name: pubDate
        label: Publication date
        type: date
        required: true
        options:
          format: YYYY-MM-DD

      - name: updatedDate
        label: Last updated
        type: date
        description: Fill in only if the article was substantially revised after first publication.
        options:
          format: YYYY-MM-DD

      # Media
      - name: heroImage
        label: Cover image
        type: image
        description: Recommended size 1200×630 px. Accepted formats: JPG, PNG, WebP, AVIF.

      - name: heroImageAlt
        label: Cover image alt text
        type: string
        required: true
        description: Describe the image for screen readers and SEO.

      # Taxonomy
      - name: category
        label: Category
        type: select
        required: true
        options:
          values:
            - label: Articles
              value: articles
            - label: Research
              value: research
            - label: Policy
              value: policy
            - label: Speaking & Media
              value: speaking
            - label: Notes
              value: notes

      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - governance
            - development
            - policy
            - education
            - health
            - technology
            - africa
            - uganda
            - consultancy
            - research
            - strategy
            - leadership
            - innovation

      # Publishing
      - name: draft
        label: Draft (hidden from site)
        type: boolean
        default: true
        description: Turn off to publish. While on, the article is invisible to visitors.

      - name: featured
        label: Featured on homepage
        type: boolean
        default: false
        description: Pins this article to the Featured Research section on the homepage.

      # Author
      - name: authors
        label: Author
        type: select
        required: true
        default: ["default"]
        options:
          multiple: true
          values:
            - label: Nite Tanzarn
              value: default

      # Optional extras
      - name: pdfDownload
        label: PDF download URL
        type: string
        description: Paste the Cloudflare R2 public URL of the PDF version of this article.
        pattern: "^https?://.+"

      - name: readingTime
        label: Reading time (minutes)
        type: number
        description: Approximate reading time. Leave blank to auto-calculate.
        options:
          min: 1
          max: 120

      - name: locale
        label: Language
        type: select
        default: en
        hidden: true
        options:
          values:
            - label: English
              value: en

      # SEO overrides
      - name: seo
        component: seo

      # Body — maps to MDX content below frontmatter
      - name: body
        label: Content
        type: rich-text
        options:
          format: mdx


  # -------------------------------------------------------------------------
  # PROJECTS — consultancy and research projects
  # Maps to: src/content/posts/en/*.mdx with category: projects
  # Stored as a separate CMS section for clarity, same path prefix
  # -------------------------------------------------------------------------

  - name: projects
    label: Projects
    type: collection
    path: src/content/projects/en
    extension: mdx
    filename:
      prefix: "{year}-"
      field: title
      slugify: true
    view:
      fields: [title, status, pubDate]
      sort:
        - field: pubDate
          order: desc
    fields:

      - name: title
        label: Project title
        type: string
        required: true

      - name: description
        label: Short description
        type: text
        required: true
        description: One or two sentences for the project card.
        options:
          maxlength: 200

      - name: heroImage
        label: Cover image
        type: image

      - name: heroImageAlt
        label: Cover image alt text
        type: string

      - name: pubDate
        label: Project date
        type: date
        required: true
        options:
          format: YYYY-MM-DD

      - name: status
        label: Status
        type: select
        required: true
        options:
          values:
            - label: Completed
              value: completed
            - label: Ongoing
              value: ongoing
            - label: Upcoming
              value: upcoming

      - name: client
        label: Client / Organisation
        type: string

      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - governance
            - development
            - policy
            - education
            - health
            - technology
            - africa
            - uganda
            - consultancy
            - research

      - name: projectUrl
        label: External project link
        type: string
        description: Link to a report, publication, or client page.
        pattern: "^https?://.+"

      - name: relatedArticles
        label: Related articles
        type: select
        description: Paste the slug(s) of related articles.
        options:
          multiple: true
          creatable: true

      - name: featured
        label: Feature on homepage
        type: boolean
        default: false

      - name: draft
        label: Draft (hidden from site)
        type: boolean
        default: true

      - name: locale
        label: Language
        type: select
        default: en
        hidden: true
        options:
          values:
            - label: English
              value: en

      - name: seo
        component: seo

      - name: body
        label: Project details
        type: rich-text
        description: Include Challenge, Approach, and Outcome sections.
        options:
          format: mdx


  # -------------------------------------------------------------------------
  # SPEAKING & MEDIA — talks, interviews, panels, press mentions
  # -------------------------------------------------------------------------

  - name: speaking
    label: Speaking & Media
    type: collection
    path: src/content/speaking/en
    extension: mdx
    filename:
      prefix: "{year}-{month}-{day}-"
      field: title
      slugify: true
    view:
      fields: [title, eventType, eventDate]
      sort:
        - field: eventDate
          order: desc
    fields:

      - name: title
        label: Talk / event title
        type: string
        required: true

      - name: description
        label: Short description
        type: text
        required: true
        options:
          maxlength: 200

      - name: eventDate
        label: Event date
        type: date
        required: true
        options:
          format: YYYY-MM-DD

      - name: pubDate
        label: Published date
        type: date
        required: true
        options:
          format: YYYY-MM-DD

      - name: eventType
        label: Event type
        type: select
        required: true
        options:
          values:
            - label: Keynote
              value: keynote
            - label: Panel
              value: panel
            - label: Interview
              value: interview
            - label: Podcast
              value: podcast
            - label: Press mention
              value: press
            - label: Webinar
              value: webinar
            - label: Workshop
              value: workshop

      - name: organisation
        label: Organising body / publication
        type: string

      - name: location
        label: Location
        type: string
        description: City and country, or "Online".

      - name: heroImage
        label: Event image
        type: image

      - name: heroImageAlt
        label: Image alt text
        type: string

      - name: recordingUrl
        label: Recording URL
        type: string
        description: YouTube, Vimeo, or other link.
        pattern: "^https?://.+"

      - name: slidesUrl
        label: Slides URL
        type: string
        description: Link to slide deck or PDF.
        pattern: "^https?://.+"

      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - governance
            - development
            - policy
            - education
            - technology
            - africa
            - leadership

      - name: featured
        label: Feature on homepage
        type: boolean
        default: false

      - name: draft
        label: Draft (hidden from site)
        type: boolean
        default: true

      - name: locale
        label: Language
        type: select
        default: en
        hidden: true
        options:
          values:
            - label: English
              value: en

      - name: seo
        component: seo

      - name: body
        label: Notes / summary
        type: rich-text
        options:
          format: mdx


  # -------------------------------------------------------------------------
  # PAGES — static singleton pages
  # Maps to: src/content/pages/en/*.mdx
  # Each page is edited as a separate file; only one entry per page is
  # listed so a single entry is the source of truth.
  # -------------------------------------------------------------------------

  - name: about
    label: About
    type: file
    path: src/content/pages/en/about.mdx
    fields:
      - name: title
        label: Title
        type: string
        default: About
        hidden: true
      - name: description
        label: Summary
        type: text
      - name: seoTitle
        label: SEO title
        type: string
      - name: seoDescription
        label: SEO description
        type: text
      - name: draft
        label: Draft (hidden from site)
        type: boolean
        default: false
      - name: body
        label: Page body
        type: rich-text
        options:
          format: mdx

  - name: contact
    label: Contact
    type: file
    path: src/content/pages/en/contact.md
    fields:
      - name: title
        label: Title
        type: string
        default: Contact
        hidden: true
      - name: description
        label: Summary
        type: text
      - name: seoTitle
        label: SEO title
        type: string
      - name: seoDescription
        label: SEO description
        type: text
      - name: draft
        label: Draft (hidden from site)
        type: boolean
        default: false
      - name: body
        label: Page body
        type: rich-text
        options:
          format: markdown

  - name: values
    label: Our Values
    type: file
    path: src/content/pages/en/values.mdx
    fields:
      - name: title
        label: Title
        type: string
        default: "Our Values"
        hidden: true
      - name: description
        label: Summary
        type: text
      - name: seoTitle
        label: SEO title
        type: string
      - name: seoDescription
        label: SEO description
        type: text
      - name: draft
        label: Draft (hidden from site)
        type: boolean
        default: false
      - name: body
        label: Page body
        type: rich-text
        options:
          format: mdx

  - name: services
    label: Consultancy (Services)
    type: file
    path: src/content/pages/en/services.mdx
    fields:
      - name: title
        label: Title
        type: string
        default: Consultancy
        hidden: true
      - name: description
        label: Summary
        type: text
      - name: seoTitle
        label: SEO title
        type: string
      - name: seoDescription
        label: SEO description
        type: text
      - name: draft
        label: Draft (hidden from site)
        type: boolean
        default: false
      - name: body
        label: Page body
        type: rich-text
        options:
          format: mdx

  - name: annotations
    label: Annotations
    type: file
    path: src/content/pages/en/annotations.mdx
    fields:
      - name: title
        label: Title
        type: string
        default: Annotations
        hidden: true
      - name: description
        label: Summary
        type: text
      - name: seoTitle
        label: SEO title
        type: string
      - name: seoDescription
        label: SEO description
        type: text
      - name: draft
        label: Draft (hidden from site)
        type: boolean
        default: false
      - name: body
        label: Page body
        type: rich-text
        options:
          format: mdx


  # -------------------------------------------------------------------------
  # SITE SETTINGS — homepage hero text, social links, newsletter
  # Editable without touching code
  # -------------------------------------------------------------------------

  - name: settings
    label: Site settings
    type: file
    path: src/config/site-overrides.json
    fields:

      - name: heroHeadline
        label: Hero headline
        type: string
        description: Large text at the top of the homepage. e.g. "Ideas that shape policy."
        options:
          maxlength: 60

      - name: heroSubheadline
        label: Hero sub-headline
        type: string
        description: Second line of the hero. e.g. "Research that drives decisions."
        options:
          maxlength: 80

      - name: heroCtaLabel
        label: Hero button label
        type: string
        description: Text on the primary call-to-action button.
        options:
          maxlength: 30

      - name: heroCtaUrl
        label: Hero button URL
        type: string
        description: Where the button links. e.g. /en/articles/
        options:
          maxlength: 100

      - name: social
        label: Social links
        type: object
        fields:
          - name: twitter
            label: X / Twitter URL
            type: string
            pattern: "^https?://.+"
          - name: linkedin
            label: LinkedIn URL
            type: string
            pattern: "^https?://.+"
          - name: medium
            label: Medium URL
            type: string
            pattern: "^https?://.+"
          - name: github
            label: GitHub URL
            type: string
            pattern: "^https?://.+"

      - name: newsletterHeadline
        label: Newsletter section headline
        type: string
        options:
          maxlength: 60

      - name: newsletterDescription
        label: Newsletter section description
        type: text
        options:
          maxlength: 200

      - name: newsletterFormUrl
        label: Newsletter form embed URL
        type: string
        description: Paste your Brevo or other newsletter embed action URL.
        pattern: "^https?://.+"


# ---------------------------------------------------------------------------
# SETTINGS
# ---------------------------------------------------------------------------

settings:
  content: merge
  commit:
    # Pages CMS attributes commits to the editor who saved the change instead
    # of the GitHub App bot. Email-only collaborators (no GitHub account on
    # the editor's side) commit under their own name and email, so the GitHub
    # history reads as a normal contributor graph.
    identity: user
    templates:
      content: "content({name}): {field.title}"
      media: "media: upload {filename}"
